  <!--
    ══════════════════════════════════════════════════════════════
    PILAR 4 — SKELETON LOADER

    QUÉ ES UN SKELETON LOADER:
    Es un placeholder animado que imita la forma del contenido
    final. El usuario ve inmediatamente que hay algo cargando,
    en lugar del flash de "Jordan Josue Pardo" que luego cambia.

    CÓMO FUNCIONA:
    1. Los elementos de texto del perfil (nombre, bio, etc.) arrancan
       con la clase "skeleton" y sin texto.
    2. La clase .skeleton aplica un fondo gris con animación shimmer
       (el efecto de luz que se desplaza de izquierda a derecha).
    3. Cuando _pintarPerfil() en app.js recibe los datos de Firestore,
       hace el.classList.remove('skeleton') y escribe el textContent.
    4. La transición es instantánea y limpia. Cero flash de datos falsos.

    POR QUÉ CSS EN LUGAR DE JS:
    El skeleton es puramente visual. CSS maneja animaciones 60 FPS
    sin bloquear el hilo principal de JavaScript. Más eficiente,
    más simple, más mantenible. No necesitamos ninguna librería.

    VARIABLES CSS DEL SKELETON:
    --skeleton-base:  #e2e8f0  → gris base del placeholder
    --skeleton-shine: #f8fafc  → gris claro del brillo animado
    ══════════════════════════════════════════════════════════════
  -->
  <style>
    /* ── Base del skeleton ─────────────────────────────── */
    .skeleton {
      background: linear-gradient(
        90deg,
        #e2e8f0 25%,
        #f1f5f9 50%,
        #e2e8f0 75%
      );
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
      color: transparent !important;   /* ocultar cualquier texto residual */
      user-select: none;
      min-height: 1em;                 /* garantiza altura mínima visible */
    }

    /* El brillo viaja de izquierda a derecha */
    @keyframes skeleton-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Variantes para elementos específicos ──────────── */

    /* Avatar circular */
    #ui-avatar.skeleton {
      border-radius: 50%;
      width: 100%;
      height: 100%;
      min-height: auto;
    }

    /* Nombre — línea ancha */
    #ui-nombre.skeleton {
      display: block;
      width: 180px;
      height: 22px;
      margin: 0 auto;
      border-radius: 6px;
    }

    /* Bio — línea más estrecha */
    #ui-bio.skeleton {
      display: block;
      width: 220px;
      height: 16px;
      margin: 8px auto 0;
      border-radius: 6px;
    }

    /* Texto de ubicación y teléfono */
    #ui-ubicacion.skeleton,
    #perfil-telefono-display.skeleton {
      display: inline-block;
      width: 80px;
      height: 13px;
      border-radius: 4px;
      vertical-align: middle;
    }

    /* Descripción "acerca de mí" */
    #ui-acerca.skeleton {
      display: block;
      width: 100%;
      height: 48px;
      border-radius: 6px;
    }
  </style>

<script>
  const btnSettings  = document.getElementById('btn-settings');
  const settingsMenu = document.getElementById('settings-menu');
  if(btnSettings && settingsMenu) {
    btnSettings.addEventListener('click', e => { e.stopPropagation(); settingsMenu.classList.toggle('up-settings-menu--open'); });
    document.addEventListener('click', () => settingsMenu.classList.remove('up-settings-menu--open'));
  }

  window.addEventListener('load', () => {
    const btnCerrarSesion = document.querySelector('.up-settings-item--danger');
    if (btnCerrarSesion) {
      btnCerrarSesion.addEventListener('click', () => {
        if (typeof window.cerrarSesionSeguro === 'function') {
          window.cerrarSesionSeguro();
        } else {
          localStorage.removeItem('unp_user_profile');
          localStorage.removeItem('listaFavoritos');
          localStorage.removeItem('mostrarToastPublicar');
          localStorage.removeItem('productoSeleccionado');
          window.location.replace(window.location.origin + '/login.html');
        }
      });
    }
  });
</script>

    const editImagenArea = document.getElementById('edit-imagen-area');
    const editImagenFile = document.getElementById('edit-imagen-file');
    if (editImagenArea && editImagenFile) {
      editImagenArea.addEventListener('click', () => editImagenFile.click());
      editImagenFile.addEventListener('change', (e) => {
        if (e.target.files[0]) { editImagenArea.textContent = `✓ ${e.target.files[0].name}`; editImagenArea.style.borderColor = "#22c55e"; }
      });
    }

    const boxAvatar        = document.getElementById('box-upload-avatar');
    const inputAvatarFile  = document.getElementById('file-avatar');
    const inputAvatarHidden = document.getElementById('perfil-input-avatar');
    if (boxAvatar && inputAvatarFile) {
      boxAvatar.addEventListener('click', () => inputAvatarFile.click());
      inputAvatarFile.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        boxAvatar.textContent = "Cargando imagen...";
        boxAvatar.style.background = "#f8fafc";
        boxAvatar.style.pointerEvents = "none";
        if(btnGuardar) btnGuardar.disabled = true;
        const formData = new FormData();
        formData.append("image", file);
        try {
          const res  = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: formData });
          const data = await res.json();
          if (data.success) {
            inputAvatarHidden.value = data.data.url;
            boxAvatar.textContent   = "Imagen subida correctamente";
            boxAvatar.style.background   = "#f0fdf4";
            boxAvatar.style.borderColor  = "#22c55e";
          } else { boxAvatar.textContent = "Error al procesar la imagen"; boxAvatar.style.background = "#fef2f2"; }
        } catch { boxAvatar.textContent = "Error de conexión"; }
        finally { boxAvatar.style.pointerEvents = "auto"; if(btnGuardar) btnGuardar.disabled = false; }
      });
    }

    const boxPortada         = document.getElementById('box-upload-portada');
    const inputPortadaFile   = document.getElementById('file-portada');
    const inputPortadaHidden = document.getElementById('perfil-input-portada');
    if (boxPortada && inputPortadaFile) {
      boxPortada.addEventListener('click', () => inputPortadaFile.click());
      inputPortadaFile.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        boxPortada.textContent = "Cargando imagen...";
        boxPortada.style.background = "#f8fafc";
        boxPortada.style.pointerEvents = "none";
        if(btnGuardar) btnGuardar.disabled = true;
        const formData = new FormData();
        formData.append("image", file);
        try {
          const res  = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: formData });
          const data = await res.json();
          if (data.success) {
            inputPortadaHidden.value = data.data.url;
            boxPortada.textContent   = "Imagen subida correctamente";
            boxPortada.style.background  = "#f0fdf4";
            boxPortada.style.borderColor = "#22c55e";
          } else { boxPortada.textContent = "Error al procesar la imagen"; boxPortada.style.background = "#fef2f2"; }
        } catch { boxPortada.textContent = "Error de conexión"; }
        finally { boxPortada.style.pointerEvents = "auto"; if(btnGuardar) btnGuardar.disabled = false; }
      });
    }
  });
</script>
